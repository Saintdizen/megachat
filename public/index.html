<head>
    <link rel="stylesheet" href="index.css">
</head>

<script src="/socket.io/socket.io.js"></script>
<script>
    // Connect to the server
    const socket = io('http://localhost:3000');

    // Send a message to the server
    function sendMessage() {
        if (document.getElementById('message').value !== '') {
            socket.emit('chat message', document.getElementById('message').value);
            document.getElementById('message').value = '';
        }
    }

    window.onkeydown = (event) => {
        if(event.keyCode === 13) sendMessage()
    }

    // Listen for messages from the server
    socket.on('message', (id, msg) => {
        //
        let div_user = document.createElement('div');
        div_user.innerHTML = id;
        div_user.id = "div_user"
        //
        let div_message = document.createElement('div');
        div_message.innerHTML = msg;
        div_message.id = "div_message"
        //
        let div_answer = document.createElement('div');
        div_answer.id = "div_answer"
        div_answer.append(div_user, div_message)
        //
        document.getElementById("messages").append(div_answer)
        let elem = document.getElementById('messages');
        elem.scrollTop = elem.scrollHeight;
    });

    socket.on('all_users', (users) => {
        document.getElementById("users").innerHTML = ''
        for (let user of users) {
            let div_user = document.createElement('div');
            div_user.innerHTML = user.id;
            div_user.id = "div_user"
            document.getElementById("users").appendChild(div_user)
        }
    });
</script>


<div id="main_users">
    <div id="users"></div>

</div>
<div id="main_messages">
    <div id="messages"></div>

    <div id="main_controls">
        <input type="text" name="message" id="message" placeholder="Введите сообщение"/>
        <button onclick="sendMessage()">Отправить</button>
    </div>
</div>
