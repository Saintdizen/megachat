<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>chUiChat</title>
    <link rel="stylesheet" href="https://stackpath.bootstrapcdn.com/bootstrap/4.4.1/css/bootstrap.min.css" >
</head>
<body>

<div class="container" id="user-reg-section">
    <div class="form-group">
        <label for="exampleInputEmail1">Введите ваше имя</label>
        <input id="username" placeholder="Your Username" class="form-control">
    </div>
    <button id="usernameRegisterBtn" class="btn btn-primary">ВОЙТИ</button>
</div>

<div class="container-fluid" id="video-call-section" hidden>
    <div class="form-group">
        <label for="exampleInputEmail1">Введите имя пользователя для звонка</label>
        <input id="usertocall" placeholder="Username To Call" class="form-control">
    </div>
    <button id="calluser" class="btn btn-primary">СОЕДЕНИТЬ</button>

    <div class="container-fluid">
        <div class="row h-100 w-100">
            <div class="col-12 col-sm-6 d-flex justify-content-center">
                <div class="embed-responsive embed-responsive-16by9">
                    <video class="embed-responsive-item" muted></video>
                </div>
            </div>
            <div class="col-12 col-sm-6 d-flex justify-content-center">
                <div id="peerDiv" class="embed-responsive embed-responsive-16by9">

                </div>
            </div>
        </div>
    </div>
</div>

<script src="/socket.io/socket.io.js"></script>
<script src="bundle.js"></script>
<script src="simplepeer.min.js" ></script>
<!-- <script src="client.js" ></script> -->
</body>
</html>
