<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>chUiChat</title>
    <link rel="stylesheet" href="index.css" >
</head>
<body>

<div id="user-reg-section">
    <div class="controls">
        <input id="username" placeholder="Введите ваше имя">
        <button id="usernameRegisterBtn">ВОЙТИ</button>
    </div>
</div>

<div id="video-call-section" hidden>
    <div class="controls">
        <input id="usertocall" placeholder="Введите имя пользователя, которому хотите позвонить">
        <button id="calluser">СОЕДЕНИТЬ</button>
    </div>

    <div>
        <div>
            <div>
                <div>
                    <video muted></video>
                </div>
            </div>
            <div>
                <div id="peerDiv">

                </div>
            </div>
        </div>
    </div>
</div>

<script src="/socket.io/socket.io.js"></script>
<script src="bundle.js"></script>
<script src="simplepeer.min.js" ></script>
<!-- <script src="client.js" ></script> -->
</body>
</html>
