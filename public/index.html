<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>chUiChat</title>
    <link rel="stylesheet" href="index.css" >
</head>
<body>

<div class="main_videos_block" id="video-call-section">
    <div class="controls">
        <input id="usertocall" placeholder="Введите имя пользователя, которому хотите позвонить">
        <button id="calluser">СОЕДЕНИТЬ</button>
    </div>

    <div class="videos_block">
        <div class="local_video"><video muted></video></div>
        <div class="remote_video" id="peerDiv"></div>
    </div>
</div>

<script src="/socket.io/socket.io.js"></script>
<script src="bundle.js"></script>
<script src="simplepeer.min.js" ></script>
<script>
    function getCookie(name) {
        // Add a semicolon and space prefix for consistent splitting
        let value = "; " + document.cookie;
        let parts = value.split("; " + name + "=");

        // If the cookie name was found, extract the value
        if (parts.length === 2) {
            // Pop the value part and split by the next semicolon to get the value
            return parts.pop().split(';').shift();
        }
        return null; // Return null if the cookie is not found
    }


    window.onload = () => {
        console.log(document.cookie);
        fetch('/check', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({
                name: getCookie('user')
            }),
        }).then(data => {
            console.log('Success:', data)
        }).catch((error) => console.error('Error:', error));
    }
</script>
</body>
</html>
